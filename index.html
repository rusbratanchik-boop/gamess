<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Рулетка госномеров </title>
    <!-- Яндекс SDK -->
    <script src="/sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&display=swap" rel="stylesheet">
    <style>
        :root {
            --br-bg: #050608;
            --br-panel: #0b0e14;
            --br-card: #121620;
            --br-red: #ff111c;
            --br-red-glow: rgba(255, 17, 28, 0.6);
            --rarity-common: #6c757d;
            --rarity-zerkalo: #2ecc71;
            --rarity-series: #3498db;
            --rarity-ten: #1abc9c;
            --rarity-round: #48c9b0;
            --rarity-rare: #f39c12;
            --rarity-elite: #9b59b6;
            --rarity-legend: #f1c40f;
            --rarity-exclusive: #e74c3c;
            --rarity-police: #1abc9c;
            --rarity-foreign: #f1c40f;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background-color: var(--br-bg);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% -20%, #290a0d 0%, var(--br-bg) 65%);
        }
        .toast-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            color: #2ecc71;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            z-index: 1000;
            border-left: 4px solid #2ecc71;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 14px;
            white-space: nowrap;
        }
        .calendar-icon {
            position: fixed;
            top: 20px;
            left: 20px;
            background: #131924;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 28px;
            z-index: 200;
            border: 1px solid #ff111c;
            transition: 0.2s;
        }
        .calendar-icon:hover {
            transform: scale(1.05);
            background: #ff111c;
        }
        .calendar-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .calendar-card {
            background: #0b0e14;
            border-radius: 24px;
            padding: 20px;
            width: 90%;
            max-width: 600px;
            border: 1px solid #ff111c;
            text-align: center;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .calendar-day {
            background: #121620;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .calendar-day.available { border: 2px solid #2ecc71; }
        .calendar-day.claimed { opacity: 0.5; cursor: default; }
        .calendar-day.today { background: #ff111c; }
        .claim-btn {
            background: #2ecc71;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        .br-header {
            width: 100%;
            max-width: 1250px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(90deg, #0f131c 0%, rgba(15, 19, 28, 0.2) 100%);
            padding: 15px 30px;
            border-radius: 14px;
            border-left: 5px solid var(--br-red);
            box-shadow: 0 10px 35px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }
        .br-logo {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-style: italic;
        }
        .br-logo span {
            color: var(--br-red);
            text-shadow: 0 0 20px var(--br-red-glow);
        }
        .br-money {
            font-size: 22px;
            font-weight: 900;
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.06);
            padding: 8px 22px;
            border-radius: 10px;
            border: 1px solid rgba(46, 204, 113, 0.2);
            text-shadow: 0 0 15px rgba(46, 204, 113, 0.2);
        }
        .game-grid {
            width: 100%;
            max-width: 1250px;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }
        @media (max-width: 1024px) {
            .game-grid { grid-template-columns: 1fr; }
        }
        .roulette-box {
            background: var(--br-panel);
            border-radius: 18px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.01);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            position: relative;
        }
        .box-title {
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            background: linear-gradient(180deg, #fff 0%, #bdc3c7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .box-desc {
            color: #626d7a;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .mode-selector {
            display: flex;
            background: #06080b;
            padding: 5px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.03);
            margin-bottom: 20px;
            gap: 4px;
        }
        .mode-btn {
            background: transparent;
            border: none;
            color: #515f70;
            font-weight: 900;
            font-size: 13px;
            padding: 8px 22px;
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .mode-btn:hover { color: #fff; }
        .mode-btn.active {
            background: linear-gradient(135deg, #242c3b 0%, #10141d 100%);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .roulette-rows-holder {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 25px;
            position: relative;
        }
        .roulette-rows-holder.grid-layout {
            grid-template-columns: repeat(2, 1fr);
            column-gap: 34px;
        }
        .roulette-rows-holder.grid-layout::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            left: calc(50% - 1.5px); width: 3px;
            background: linear-gradient(to bottom, #ff111c, #96050b, #ff111c);
            box-shadow: 0 0 10px rgba(255, 17, 28, 0.5);
            z-index: 2;
        }
        .roulette-window {
            width: 100%; position: relative;
            background: #050609; border-radius: 10px;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.02);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.95);
            display: flex; align-items: center;
        }
        .roulette-window.mode-size-single { height: 85px; }
        .roulette-window.mode-size-multi { height: 55px; }
        .roulette-pointer {
            position: absolute; top: 0; left: 50%;
            transform: translateX(-50%);
            width: 2px; height: 100%;
            background: var(--br-red); z-index: 5;
            box-shadow: 0 0 12px 2px var(--br-red);
        }
        .roulette-container-tape {
            display: flex; position: absolute;
            left: 0; top: 0; height: 100%;
            align-items: center; transform: translate3d(0, 0, 0);
            will-change: transform;
        }
        .tape-item-wrapper {
            margin: 0 6px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            position: relative; border-radius: 6px;
        }
        .mode-size-single .tape-item-wrapper { width: 170px; height: 52px; }
        .mode-size-multi .tape-item-wrapper { width: 130px; height: 38px; }
        .action-buttons-container {
            display: flex; gap: 15px; width: 100%; justify-content: center;
        }
        .br-spin-btn, .br-upgrade-trigger-btn, .br-shop-trigger-btn, .br-auction-trigger-btn {
            padding: 16px 40px; font-size: 15px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 0.5px;
            border-radius: 12px; cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease; border: none;
        }
        .br-spin-btn {
            background: linear-gradient(180deg, #ff2e3b 0%, #d60b14 100%);
            color: #fff; box-shadow: 0 0 30px rgba(255, 17, 28, 0.3);
            border-bottom: 4px solid #8c060b;
        }
        .br-spin-btn:hover { box-shadow: 0 0 40px rgba(255, 17, 28, 0.5); transform: translateY(-1px); }
        .br-spin-btn:active { transform: translateY(2px); border-bottom-width: 0px; }
        .br-upgrade-trigger-btn {
            background: linear-gradient(180deg, #2ecc71 0%, #1e7e43 100%);
            color: #fff; box-shadow: 0 0 30px rgba(46, 204, 113, 0.2);
            border-bottom: 4px solid #14552e;
        }
        .br-upgrade-trigger-btn:hover { box-shadow: 0 0 40px rgba(46, 204, 113, 0.4); transform: translateY(-1px); }
        .br-upgrade-trigger-btn:active { transform: translateY(2px); border-bottom-width: 0px; }
        .br-shop-trigger-btn {
            background: linear-gradient(135deg, #ff5e00, #ff2b00);
            color: #fff; box-shadow: 0 0 30px rgba(255, 80, 0, 0.3);
            border-bottom: 4px solid #b23c00;
        }
        .br-shop-trigger-btn:hover { box-shadow: 0 0 40px rgba(255, 80, 0, 0.5); transform: translateY(-1px); }
        .br-shop-trigger-btn:active { transform: translateY(2px); border-bottom-width: 0px; }
        .br-auction-trigger-btn {
            background: linear-gradient(135deg, #8e44ad, #5b2c6f);
            color: #fff; box-shadow: 0 0 30px rgba(142, 68, 173, 0.3);
            border-bottom: 4px solid #4a235a;
        }
        .br-auction-trigger-btn:hover { box-shadow: 0 0 40px rgba(142, 68, 173, 0.5); transform: translateY(-1px); }
        .br-auction-trigger-btn:active { transform: translateY(2px); border-bottom-width: 0px; }
        .br-spin-btn:disabled, .br-upgrade-trigger-btn:disabled, .br-shop-trigger-btn:disabled, .br-auction-trigger-btn:disabled { opacity: 0.2; cursor: not-allowed; transform: none !important; border-bottom-width: 4px !important; }
        .inventory-box {
            background: var(--br-panel); border-radius: 18px; padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.01); display: flex; flex-direction: column;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); height: fit-content;
        }
        .inv-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .inv-header h3 { font-size: 15px; font-weight: 900; text-transform: uppercase; }
        .btn-sell-all { background: rgba(231, 76, 60, 0.1); border: 1px solid rgba(231, 76, 60, 0.25); color: #e74c3c; padding: 6px 14px; font-size: 11px; font-weight: 900; text-transform: uppercase; border-radius: 6px; cursor: pointer; transition: 0.2s ease; }
        .btn-sell-all:hover { background: #e74c3c; color: #fff; box-shadow: 0 0 15px rgba(231, 76, 60, 0.3); }
        .inv-wrapper-relative { position: relative; width: 100%; display: flex; align-items: center; justify-content: center; }
        .inv-grid { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(3, 95px); gap: 10px; width: 100%; }
        .inv-slot { background: #06080b; border: 1px solid #141922; border-radius: 10px; padding: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; height: 95px; }
        .inv-slot:hover { border-color: #35425c; background: #0e121a; }
        .slot-worth { font-size: 11px; color: #2ecc71; font-weight: 700; margin-top: 2px; }
        .slot-status { font-size: 9px; text-transform: uppercase; font-weight: 900; margin-top: 4px; }
        .inv-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 38px; height: 38px; background: #10141d; border: 1px solid #202736; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; cursor: pointer; z-index: 10; visibility: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .inv-arrow:hover { background: var(--br-red); border-color: var(--br-red); box-shadow: 0 0 12px var(--br-red-glow); }
        .arrow-left { left: -18px; }
        .arrow-right { right: -18px; }
        .br-popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(2, 3, 5, 0.94); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .popup-card { background: #090c12; border-top: 4px solid var(--br-red); padding: 35px 25px; border-radius: 14px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.9); }
        .popup-btns { display: flex; gap: 12px; margin-top: 25px; }
        .popup-btns button { flex: 1; padding: 12px; font-weight: 700; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; font-size: 13px; }
        .btn-confirm { background: #2ecc71; color: #fff; }
        .btn-close { background: #232d3a; color: #fff; }
        .plate-image { width: 100%; height: auto; filter: drop-shadow(0 3px 4px rgba(0,0,0,0.4)); }
        .inv-page-counter { text-align: center; font-size: 11px; color: #465363; font-weight: 700; margin-top: 15px; text-transform: uppercase; }
        .upgrade-screen, .shop-screen, .auction-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(4, 5, 7, 0.98); z-index: 150; padding: 20px; overflow-y: auto; }
        .upgrade-container, .shop-container, .auction-container { max-width: 1350px; margin: 0 auto; display: grid; grid-template-columns: 320px 1fr 560px; gap: 20px; min-height: 100%; padding-bottom: 40px; }
        @media (max-width: 1200px) { .upgrade-container, .shop-container, .auction-container { grid-template-columns: 1fr; } }
        .up-panel, .auction-panel { background: #090c12; border-radius: 16px; border: 1px solid rgba(255,255,255,0.02); padding: 20px; display: flex; flex-direction: column; max-height: 750px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .up-panel-title, .auction-panel-title { font-size: 13px; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; border-bottom: 2px solid #141923; padding-bottom: 12px; color: #a2b4cc; letter-spacing: 0.5px; }
        .up-my-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px; }
        .up-target-grid-wrapper { flex: 1; overflow-y: auto; padding-right: 5px; }
        .up-target-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .up-item-row { background: #0e121a; border: 1px solid #19202e; border-radius: 10px; padding: 12px; cursor: pointer; transition: 0.2s; }
        .up-item-row.selected { border-color: #2ecc71; background: rgba(46, 204, 113, 0.04); }
        .target-section-title-embedded { grid-column: span 3; font-size: 11px; font-weight: 900; color: #ff111c; text-transform: uppercase; margin: 15px 0 8px 0; border-bottom: 1px solid rgba(255,17,28,0.15); }
        .target-section-title-embedded.less-blat { color: #1e88e5; border-bottom-color: rgba(30,136,229,0.15); }
        .up-target-card { background: #0e121a; border: 1px solid #19202e; border-radius: 8px; padding: 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .up-target-card.selected { border-color: #ff111c; background: rgba(255, 17, 28, 0.07); }
        .target-price-tag { font-size: 10px; font-weight: 900; color: #2ecc71; margin-top: 4px; text-align: center; }
        .up-center-arena { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; position: relative; padding-top: 40px; }
        .close-upgrade-btn, .close-shop-btn, .close-auction-btn { position: absolute; top: 0; right: 0; background: #131924; color: #a2b4cc; border: 1px solid #1c2536; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 11px; text-transform: uppercase; transition: 0.2s; }
        .close-upgrade-btn:hover, .close-shop-btn:hover, .close-auction-btn:hover { background: var(--br-red); color: #fff; border-color: var(--br-red); }
        .wheel-box { position: relative; width: 280px; height: 280px; margin-bottom: 25px; margin-top: 20px; }
        .wheel-svg-canvas { width: 100%; height: 100%; transform: rotate(-90deg); transition: transform 4s cubic-bezier(0.15, 0.85, 0.2, 1); }
        .wheel-pointer-arrow { position: absolute; top: -12px; left: calc(50% - 12px); width: 24px; height: 24px; background: #ffffff; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 25; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5)); }
        .wheel-inner-center { position: absolute; top: 20px; left: 20px; width: 240px; height: 240px; background: #06080c; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid #141a26; box-shadow: inset 0 0 25px rgba(0,0,0,0.9); z-index: 10; text-align: center; padding: 15px; }
        .chance-value-text { font-size: 38px; font-weight: 900; color: #2ecc71; text-shadow: 0 0 20px rgba(46,204,113,0.4); margin: 2px 0; }
        .preview-slot-box { width: 100%; max-width: 160px; margin-top: 8px; min-height: 42px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); border-radius: 8px; padding: 4px; border: 1px dashed #1d2536; }
        .btn-risk-action { background: linear-gradient(180deg, #ff9f00 0%, #cc5200 100%); color: #ffffff; border: none; width: 260px; height: 55px; font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; border-radius: 12px; cursor: pointer; box-shadow: 0 8px 25px rgba(204, 82, 0, 0.4); border-bottom: 4px solid #8a3700; display: flex; align-items: center; justify-content: center; transition: transform 0.1s, box-shadow 0.2s; }
        .btn-risk-action:disabled { background: #161a21; color: #384252; border-bottom: 4px solid #11141a; opacity: 0.4; cursor: not-allowed; }
        .shop-container, .auction-container { grid-template-columns: 1fr; }
        .shop-type-selector, .auction-tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .shop-type-btn, .auction-tab { background: #131924; border: none; color: #a2b4cc; padding: 12px 30px; border-radius: 40px; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .shop-type-btn.active, .auction-tab.active { background: var(--br-red); color: #fff; box-shadow: 0 0 15px var(--br-red-glow); }
        .shop-items-grid, .auction-lots-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; margin-top: 20px; }
        .shop-item-card, .lot-card { background: #0e121a; border: 1px solid #19202e; border-radius: 14px; padding: 12px; text-align: center; transition: 0.2s; }
        .shop-item-card:hover, .lot-card:hover { border-color: #ff5e00; transform: translateY(-3px); }
        .shop-item-price, .lot-price { font-size: 13px; font-weight: 900; color: #2ecc71; margin: 8px 0; }
        .shop-item-rarity, .lot-rarity { font-size: 10px; font-weight: 900; text-transform: uppercase; margin-bottom: 6px; }
        .shop-buy-btn, .lot-bid-btn, .lot-claim-btn { background: linear-gradient(180deg, #ff5e00, #cc3b00); border: none; color: #fff; font-weight: 900; padding: 8px 16px; border-radius: 30px; cursor: pointer; width: 100%; font-size: 12px; transition: 0.2s; }
        .lot-claim-btn { background: #2c3e50; }
        .lot-time { font-size: 11px; color: #f39c12; margin: 6px 0; font-family: monospace; font-weight: bold; }
        .bid-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 300; justify-content: center; align-items: center; }
        .bid-modal { background: #0e121a; border-radius: 20px; padding: 25px; min-width: 300px; text-align: center; border-top: 4px solid #ff5e00; }
        .bid-input { background: #06080b; border: 1px solid #2a3444; padding: 12px; border-radius: 12px; color: #fff; font-size: 16px; width: 100%; margin: 15px 0; }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; }
        .create-lot-panel { background: #06080b; border-radius: 20px; padding: 20px; margin-top: 30px; }
        .my-items-for-sale { display: flex; flex-wrap: wrap; gap: 12px; max-height: 300px; overflow-y: auto; margin: 15px 0; }
        .selectable-item { background: #10141d; border: 1px solid #2a3444; border-radius: 12px; padding: 8px; cursor: pointer; width: 170px; transition: 0.2s; }
        .selectable-item.selected { border-color: #2ecc71; background: #1a212f; transform: scale(1.02); }
        .price-input { background: #1a212f; border: 1px solid #2a3444; padding: 10px; border-radius: 12px; color: #fff; width: 200px; margin: 10px 0; }
        .rarity-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="calendar-icon" id="calendarIcon">📅</div>
    <div class="br-header">
        <div class="br-logo">Black<span>Russia</span></div>
        <div class="br-money" id="player-money">500 000 ₽</div>
    </div>
    <div class="game-grid" id="main-mreo-screen">
        <div class="roulette-box">
            <div class="box-title">Государственные номера</div>

    <script>
        // ---------- КОНФИГУРАЦИЯ (ЗАМЕНИТЕ НА СВОЙ URL СЕРВЕРА) ----------
        const BACKEND_URL = window.location.hostname === 'localhost' ? 'http://localhost:3000' : 'https://yanddex-production.up.railway.app';
        let ws = null;
        let playerId = null;
        let auctionLots = [];
        let currentAuctionTab = 'all';

        // ---------- ОСНОВНЫЕ ПЕРЕМЕННЫЕ ИГРЫ ----------
        let balance = 500000;
        let itemsStorage = [];
        let currentInvPage = 0;
        const ITEMS_PER_PAGE = 6;
        let currentMode = 1;
        let currentCost = 30000;
        let cardStepWidth = 182;
        let animationRunning = false;
        let selectedActiveIdx = null;
        let selectedMyCraftIdx = null;
        let selectedTargetCraftIdx = null;
        let craftAnimationActive = false;
        let lastUpgradeChance = 0;
        const alphabet = ['А','В','Е','К','М','Н','О','Р','С','Т','У','Х'];
        const regionPool = ['77','99','199','777','97','78','98','16','52'];
        const eliteLetters = ['АМР','ВОР','ЕКХ','ХАМ','КРМ','ООО','ССС','МММ','ААА'];
        const policeSeries = ['МВД','ПОЛ','ГИБ','ДПС','ОМОН','ФСБ','СОБР','КГБ','ПАТ','АРМ'];
        const foreignSeries = ['UAE','KSA','QAT','BRN','KUW','OMN','BHR','TUR','KAZ','UZB'];
        const upgradeTargetsDatabase = [
            { rawLetters: "А000АА", region: "77", worth: 33000000, type: "exclusive" },
            { rawLetters: "В001ВВ", region: "77", worth: 30000000, type: "exclusive" },
            { rawLetters: "С001СС", region: "199", worth: 28000000, type: "exclusive" },
            { rawLetters: "К001КК", region: "77", worth: 26000000, type: "exclusive" },
            { rawLetters: "М001ММ", region: "78", worth: 25000000, type: "exclusive" },
            { rawLetters: "А777АА", region: "77", worth: 22000000, type: "elite" },
            { rawLetters: "О777ОО", region: "77", worth: 20000000, type: "elite" },
            { rawLetters: "О007ОО", region: "97", worth: 15000000, type: "elite" },
            { rawLetters: "А777МР", region: "77", worth: 14000000, type: "elite" },
            { rawLetters: "Е001КХ", region: "77", worth: 12000000, type: "elite" },
            { rawLetters: "В666ОР", region: "99", worth: 10000000, type: "elite" },
            { rawLetters: "Х777АМ", region: "777", worth: 8500000, type: "elite" },
            { rawLetters: "А999АА", region: "99", worth: 8000000, type: "elite" },
            { rawLetters: "А555АА", region: "777", worth: 7500000, type: "elite" },
            { rawLetters: "Х555ХХ", region: "77", worth: 7500000, type: "elite" },
            { rawLetters: "С555СС", region: "199", worth: 7000000, type: "elite" },
            { rawLetters: "М111ММ", region: "78", worth: 5500000, type: "elite" },
            { rawLetters: "О777ОО", region: "77", worth: 4800000, type: "elite" },
            { rawLetters: "У777УУ", region: "77", worth: 3900000, type: "elite" },
            { rawLetters: "В777ВВ", region: "177", worth: 3200000, type: "rare" }
        ];
        let shopItemsType1 = [], shopItemsType2 = [];
        let currentShopType = 1;
        let lastAdTime = 0, adCooldown = 210000;

        // ---------- КАЛЕНДАРЬ (исправленные награды) ----------
        let dailyRewards = [
            { day:1, type:'money', value:200000, desc:'200 000 ₽' },
            { day:2, type:'plate', plate:{ rawLetters:'А777АА', region:'77', worth:2000000, rarityName:'Элитный', color:'var(--rarity-elite)' }, desc:'Элитный номер А777АА (2 млн ₽)' },
            { day:3, type:'combo', money:1000000, plate:{ rawLetters:'В001ВВ', region:'77', worth:5000000, rarityName:'Элитный', color:'var(--rarity-elite)' }, desc:'1 000 000 ₽ + номер В001ВВ (5 млн ₽)' },
            { day:4, type:'money', value:500000, desc:'500 000 ₽' },
            { day:5, type:'plate', plate:{ rawLetters:'М001ММ', region:'78', worth:3000000, rarityName:'Элитный', color:'var(--rarity-elite)' }, desc:'Элитный номер М001ММ (3 млн ₽)' },
            { day:6, type:'money', value:1000000, desc:'1 000 000 ₽' },
            { day:7, type:'plate', plate:{ rawLetters:'МВД777', region:'77', worth:90000000, rarityName:'Полицейский', color:'var(--rarity-police)', bgColor:'#0a2f6c' }, desc:'Полицейский номер МВД777 (90 млн ₽)' }
        ];
        let claimedDays = [];
        let lastClaimDay = 0;
        function loadCalendar() {
            let first = localStorage.getItem('br_first_play_date');
            if(!first){ let now=new Date(); localStorage.setItem('br_first_play_date', now.toDateString()); lastClaimDay=0; }
            else { let firstDate=new Date(first), today=new Date(); lastClaimDay=Math.floor((today-firstDate)/(1000*60*60*24)); }
            let claimed=localStorage.getItem('br_claimed_days');
            if(claimed) claimedDays=JSON.parse(claimed); else claimedDays=[];
        }
        function renderCalendar() {
            let grid=document.getElementById('calendarGrid'); if(!grid) return;
            grid.innerHTML='';
            for(let i=1;i<=7;i++){
                let dayDiv=document.createElement('div'); dayDiv.className='calendar-day';
                let reward=dailyRewards[i-1];
                if(claimedDays.includes(i)) dayDiv.classList.add('claimed');
                else if(lastClaimDay>=i) dayDiv.classList.add('available');
                dayDiv.innerHTML=`<strong>День ${i}</strong><br>${claimedDays.includes(i)?'✅':'🎁'}<br><small>${reward.desc}</small>`;
                dayDiv.onclick=()=>{ if(lastClaimDay>=i && !claimedDays.includes(i)) claimReward(i); else showToast('Подарок недоступен', true); };
                grid.appendChild(dayDiv);
            }
        }
        function claimReward(day){
            let r=dailyRewards[day-1];
            if(claimedDays.includes(day)){ showToast('Уже получено', true); return; }
            if(r.type==='money'){ balance+=r.value; showToast(`Вы получили ${r.value.toLocaleString()} ₽`); }
            else if(r.type==='plate'){
                if(itemsStorage.length<100){ itemsStorage.push(r.plate); showToast(`Вы получили номер ${r.plate.rawLetters}`); }
                else showToast('Нет места в архиве!', true);
            }
            else if(r.type==='combo'){
                balance+=r.money;
                if(itemsStorage.length<100){ itemsStorage.push(r.plate); showToast(`Вы получили ${r.money.toLocaleString()} ₽ и номер ${r.plate.rawLetters}`); }
                else showToast(`Вы получили ${r.money.toLocaleString()} ₽, но номер не добавлен`, true);
            }
            claimedDays.push(day);
            localStorage.setItem('br_claimed_days',JSON.stringify(claimedDays));
            syncInterface(); saveGame(); renderCalendar();
        }
        function openCalendar(){ loadCalendar(); renderCalendar(); document.getElementById('calendarModal').style.display='flex'; }
        function closeCalendar(){ document.getElementById('calendarModal').style.display='none'; }

        // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
        function showToast(message, isError = false) {
            let toast = document.querySelector('.toast-notification');
            if (!toast) {
                toast = document.createElement('div');
                toast.className = 'toast-notification';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.style.color = isError ? '#e74c3c' : '#2ecc71';
            toast.style.borderLeftColor = isError ? '#e74c3c' : '#2ecc71';
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 3500);
        }
        const getRandNum = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
        const getRandItem = (arr) => arr[Math.floor(Math.random() * arr.length)];
        function drawPlateSVG(data, bgColorOverride = null) {
            let bgColor = bgColorOverride || data.bgColor || "#fcfcfc";
            return `<svg class="plate-image" viewBox="0 0 290 62" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="2" width="286" height="58" rx="6" fill="${bgColor}" stroke="#1a1a1a" stroke-width="3.5"/>
                <rect x="6" y="6" width="278" height="50" rx="4" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
                <line x1="224" y1="6" x2="224" y2="56" stroke="#1a1a1a" stroke-width="1.2"/>
                <text x="16" y="44" font-family="'Impact', Arial Black, sans-serif" font-size="39" fill="#111" letter-spacing="3">
                    ${data.rawLetters[0]}<tspan font-size="45">${data.rawLetters.substring(1,4)}</tspan>${data.rawLetters.substring(4)}
                </text>
                <text x="257" y="34" font-family="'Impact', Arial Black, sans-serif" font-size="28" fill="#111" text-anchor="middle">
                    ${data.region}
                </text>
                <text x="239" y="50" font-family="Arial, sans-serif" font-weight="900" font-size="9" fill="#111">RUS</text>
                <rect x="261" y="42" width="16" height="3" fill="#fff" stroke="#bbb" stroke-width="0.1"/>
                <rect x="261" y="45" width="16" height="3" fill="#00247d"/>
                <rect x="261" y="48" width="16" height="3" fill="#cf142b"/>
            </svg>`;
        }
        function buildPlateData() {
            const rarityWeights = [
                { name: 'common', weight: 45, minWorth: 3000, maxWorth: 12000, color: 'var(--rarity-common)', title: 'Простой' },
                { name: 'zerkalo', weight: 16, minWorth: 30000, maxWorth: 90000, color: 'var(--rarity-zerkalo)', title: 'Зеркалка' },
                { name: 'series', weight: 12, minWorth: 15000, maxWorth: 50000, color: 'var(--rarity-series)', title: 'Серия' },
                { name: 'round', weight: 10, minWorth: 80000, maxWorth: 250000, color: 'var(--rarity-round)', title: 'Круглые' },
                { name: 'rare', weight: 8, minWorth: 200000, maxWorth: 800000, color: 'var(--rarity-rare)', title: 'Редкий' },
                { name: 'elite', weight: 5, minWorth: 500000, maxWorth: 2000000, color: 'var(--rarity-elite)', title: 'Элитный' },
                { name: 'legend', weight: 2, minWorth: 2500000, maxWorth: 6000000, color: 'var(--rarity-legend)', title: 'Легендарный' },
                { name: 'exclusive', weight: 2, minWorth: 7000000, maxWorth: 12000000, color: 'var(--rarity-exclusive)', title: 'Эксклюзив' }
            ];
            let rand = getRandNum(1,100);
            let cumulative=0, selectedRarity = rarityWeights[0];
            for(let r of rarityWeights){ cumulative+=r.weight; if(rand<=cumulative){ selectedRarity=r; break; } }
            let l1,l2,l3,n1,n2,n3, regionStr=getRandItem(regionPool);
            const randomLetters=()=>[getRandItem(alphabet),getRandItem(alphabet),getRandItem(alphabet)];
            const randomDigits=()=>[getRandNum(0,9).toString(),getRandNum(0,9).toString(),getRandNum(0,9).toString()];
            switch(selectedRarity.name){
                case 'common': [l1,l2,l3]=randomLetters(); [n1,n2,n3]=randomDigits(); break;
                case 'zerkalo': [l1,l2,l3]=randomLetters(); [n1,n2,n3]=randomDigits(); n3=n1; break;
                case 'series': [l1,l2,l3]=randomLetters(); [n1,n2,n3]=randomDigits(); if(getRandNum(0,1)===0){ n2='0'; n3='0'; } else { n2=n1; n3='0'; } break;
                case 'round': [l1,l2,l3]=randomLetters(); [n1,n2,n3]=randomDigits(); if(getRandNum(0,1)===0){ n2='0'; n3='0'; } else { n2='0'; n1=n3; } break;
                case 'rare': [l1,l2,l3]=randomLetters(); if(getRandNum(0,1)===0){ let d=getRandNum(1,9).toString(); n1=n2=n3=d; } else { n1='0'; n2='0'; n3=getRandNum(1,9).toString(); } break;
                case 'elite': { let elite=eliteLetters[getRandNum(0,eliteLetters.length-1)]; l1=elite[0]; l2=elite[1]; l3=elite[2]; [n1,n2,n3]=randomDigits(); } break;
                case 'legend': { let d=getRandNum(1,9).toString(); n1=n2=n3=d; if(getRandNum(0,1)===0){ let elite=eliteLetters[getRandNum(0,eliteLetters.length-1)]; l1=elite[0]; l2=elite[1]; l3=elite[2]; } else { [l1,l2,l3]=randomLetters(); } } break;
                case 'exclusive': { let specials=['001','777','999']; let special=specials[getRandNum(0,2)]; n1=special[0]; n2=special[1]; n3=special[2]; let elite=eliteLetters[getRandNum(0,eliteLetters.length-1)]; l1=elite[0]; l2=elite[1]; l3=elite[2]; } break;
                default: [l1,l2,l3]=randomLetters(); [n1,n2,n3]=randomDigits();
            }
            let digitsStr=n1+n2+n3;
            let finalCost=getRandNum(selectedRarity.minWorth, selectedRarity.maxWorth);
            return { rawLetters: `${l1}${digitsStr}${l2}${l3}`, region:regionStr, worth:finalCost, rarity:selectedRarity.name, rarityName:selectedRarity.title, color:selectedRarity.color };
        }
        function renderOriginalSVGPlate(data){
            let wrapper=document.createElement('div');
            wrapper.className='tape-item-wrapper';
            wrapper.style.filter='drop-shadow(0 2px 4px rgba(0,0,0,0.3))';
            wrapper.innerHTML=`${drawPlateSVG(data)}<div style="position:absolute; bottom:0; left:4px; right:4px; height:4px; background:${data.color}; border-radius:0 0 4px 4px; z-index:10;"></div>`;
            return wrapper;
        }
        function saveGame(){
            localStorage.setItem('br_balance',balance);
            localStorage.setItem('br_inventory',JSON.stringify(itemsStorage));
        }
        function loadGame(){
            let b=localStorage.getItem('br_balance'); if(b) balance=parseInt(b);
            let inv=localStorage.getItem('br_inventory'); if(inv) itemsStorage=JSON.parse(inv);
            // УДАЛЯЕМ ФЕЙКОВЫЕ ЛОТЫ АУКЦИОНА — они должны приходить только с сервера
            // allLots больше не используется, данные хранятся в auctionLots
        }

        // ---------- РУЛЕТКА И ИНВЕНТАРЬ ----------
        function buildRouletteRows(){
            let holder=document.getElementById('rows-holder');
            holder.innerHTML='';
            let sizeClass=currentMode===1?'mode-size-single':'mode-size-multi';
            for(let r=0;r<currentMode;r++){
                let win=document.createElement('div');
                win.className=`roulette-window ${sizeClass}`;
                win.innerHTML=`<div class="roulette-pointer"></div><div class="roulette-container-tape" id="tape-row-${r}"></div>`;
                holder.appendChild(win);
                let tape=document.getElementById(`tape-row-${r}`);
                for(let i=0;i<7;i++) tape.appendChild(renderOriginalSVGPlate(buildPlateData()));
            }
        }
        function setOpenerMode(mode){
            if(animationRunning) return;
            currentMode=mode;
            document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');
            let holder=document.getElementById('rows-holder');
            if(mode>1){ holder.classList.add('grid-layout'); cardStepWidth=142; }
            else{ holder.classList.remove('grid-layout'); cardStepWidth=182; }
            currentCost=mode===1?30000:mode===5?150000:300000;
            document.getElementById('spin-action-btn').innerText=`Крутить за ${currentCost.toLocaleString()} ₽`;
            buildRouletteRows();
        }
        function syncInterface(){
            document.getElementById('player-money').innerText=balance.toLocaleString()+' ₽';
            document.getElementById('inv-slots-counter').innerText=itemsStorage.length;
            let totalPages=Math.max(1,Math.ceil(itemsStorage.length/ITEMS_PER_PAGE));
            if(currentInvPage>=totalPages) currentInvPage=totalPages-1;
            document.getElementById('inv-prev-btn').style.visibility=currentInvPage>0?'visible':'hidden';
            document.getElementById('inv-next-btn').style.visibility=currentInvPage<totalPages-1?'visible':'hidden';
            document.getElementById('page-indicator').innerText=`Страница: ${currentInvPage+1} / ${totalPages}`;
            let grid=document.getElementById('inv-grid');
            grid.innerHTML='';
            let start=currentInvPage*ITEMS_PER_PAGE;
            let pageItems=itemsStorage.slice(start,start+ITEMS_PER_PAGE);
            pageItems.forEach((item,idx)=>{
                let global=start+idx;
                let block=document.createElement('div');
                block.className='inv-slot';
                block.style.borderBottom=`3px solid ${item.color}`;
                block.onclick=()=>openPopup(global);
                block.innerHTML=`<div style="width:100%; max-width:145px;">${drawPlateSVG(item)}</div><div class="slot-worth">${item.worth.toLocaleString()} ₽</div><div class="slot-status" style="color:${item.color}">${item.rarityName}</div>`;
                grid.appendChild(block);
            });
            for(let i=pageItems.length;i<ITEMS_PER_PAGE;i++){ let empty=document.createElement('div'); empty.className='inv-slot'; empty.style.opacity='0.1'; empty.innerHTML='<span style="font-size:11px;">ПУСТО</span>'; grid.appendChild(empty); }
        }
        function changeInvPage(d){ if(!animationRunning){ currentInvPage+=d; syncInterface(); } }
        function openPopup(index){ if(animationRunning) return; selectedActiveIdx=index; let obj=itemsStorage[index]; document.getElementById('popup-preview').innerHTML=drawPlateSVG(obj); document.getElementById('popup-details').innerHTML=`Тип: <span style="color:${obj.color}">${obj.rarityName}</span><br>Цена: <span style="color:#2ecc71">${obj.worth.toLocaleString()} ₽</span>`; document.getElementById('item-popup').style.display='flex'; }
        function closePopup(){ document.getElementById('item-popup').style.display='none'; selectedActiveIdx=null; }
        function sellItem(){ if(selectedActiveIdx!==null){ balance+=itemsStorage[selectedActiveIdx].worth; itemsStorage.splice(selectedActiveIdx,1); closePopup(); syncInterface(); saveGame(); showToast(`Номер продан за ${itemsStorage[selectedActiveIdx]?.worth?.toLocaleString()||0} ₽`); } }
        function sellAllPlates(){ if(itemsStorage.length===0){ showToast('Архив пуст', true); return; } let total=itemsStorage.reduce((s,p)=>s+p.worth,0); balance+=total; itemsStorage=[]; currentInvPage=0; syncInterface(); saveGame(); showToast(`Продано всё за ${total.toLocaleString()} ₽`); }
        function checkLastChance(){ if(localStorage.getItem('br_last_chance_used')==='true') return false; let totalValue=itemsStorage.reduce((s,p)=>s+p.worth,0); if(balance<currentCost && balance+totalValue<currentCost){ localStorage.setItem('br_last_chance_used','true'); balance+=100000; showToast('⚠️ Вам дан последний шанс! +100 000 ₽'); syncInterface(); saveGame(); return true; } return false; }
        function triggerRoulette(){
            if(animationRunning) return;
            if(balance<currentCost){ if(!checkLastChance()) showToast('Недостаточно денег!', true); return; }
            if(itemsStorage.length+currentMode>100){ showToast('Мало места в архиве!', true); return; }
            balance-=currentCost; saveGame(); syncInterface();
            animationRunning=true;
            let btns=['spin-action-btn','open-upgrade-btn','open-shop-btn','open-auction-btn'];
            btns.forEach(id=>document.getElementById(id).disabled=true);
            let winCellIdx=36, elementsTotal=42, winners=[];
            for(let r=0;r<currentMode;r++){
                let tape=document.getElementById(`tape-row-${r}`);
                tape.style.transition='none'; tape.style.transform='translate3d(0,0,0)'; tape.innerHTML='';
                let row=[];
                for(let i=0;i<elementsTotal;i++){ let it=buildPlateData(); row.push(it); tape.appendChild(renderOriginalSVGPlate(it)); }
                winners.push(row[winCellIdx]);
                let vw=tape.parentElement.offsetWidth;
                let off=(winCellIdx*cardStepWidth)-(vw/2)+(cardStepWidth/2)+getRandNum(-10,10);
                setTimeout(()=>{ tape.style.transition='transform 5s cubic-bezier(0.05,0.75,0.1,1)'; tape.style.transform=`translate3d(-${off}px,0,0)`; },20);
            }
            setTimeout(()=>{
                animationRunning=false;
                btns.forEach(id=>document.getElementById(id).disabled=false);
                winners.forEach(w=>itemsStorage.push(w));
                currentInvPage=Math.floor((itemsStorage.length-1)/ITEMS_PER_PAGE);
                syncInterface(); saveGame();
            },5100);
        }

        // ---------- МАГАЗИН ----------
        function initShopItems(){
            shopItemsType1=upgradeTargetsDatabase.map(i=>({...i, worth:i.worth*3, rarityName:i.type==='exclusive'?'Эксклюзив':i.type==='elite'?'Элитный':'Редкий', rarityColor:i.type==='exclusive'?'var(--rarity-exclusive)':i.type==='elite'?'var(--rarity-elite)':'var(--rarity-rare)'})).sort((a,b)=>a.worth-b.worth);
            let exoticPrices=[50000000,100000000,150000000,250000000,400000000,600000000,800000000,1000000000];
            shopItemsType2=[];
            for(let i=0;i<8;i++){
                let isPolice=i<4;
                let ser=isPolice?policeSeries[i%policeSeries.length]:foreignSeries[i%foreignSeries.length];
                let dig=String(getRandNum(100,999));
                let rawLetters=isPolice?ser[0]+dig+ser[1]+(ser[2]||'А'):ser[0]+dig+ser[1]+(ser[2]||'X');
                let region=getRandItem(regionPool);
                let rarityName=isPolice?'Полицейский':'Зарубежный';
                let rarityColor=isPolice?'var(--rarity-police)':'var(--rarity-foreign)';
                let bgColor=isPolice?'#0a2f6c':'#e67e22';
                shopItemsType2.push({rawLetters,region,worth:exoticPrices[i],rarityName,rarityColor,bgColor});
            }
            shopItemsType2.push({rawLetters:"⠀⠀⠀1",region:"777",worth:1000000000,rarityName:"Арабский эксклюзив",rarityColor:"#f39c12",bgColor:"#f1c40f"});
            shopItemsType2.sort((a,b)=>a.worth-b.worth);
        }
        function toggleShopScreen(show){ if(show){ if(shopItemsType1.length===0)initShopItems(); document.getElementById('shop-screen').style.display='block'; currentShopType=1; document.querySelectorAll('.shop-type-btn').forEach(b=>b.classList.remove('active')); document.querySelector('.shop-type-btn[data-type="1"]').classList.add('active'); renderShopItems(1); } else document.getElementById('shop-screen').style.display='none'; }
        function renderShopItems(type){
            let container=document.getElementById('shop-items-container');
            let items=type===1?shopItemsType1:shopItemsType2;
            container.innerHTML='';
            items.forEach((item,idx)=>{
                let bg=type===2?item.bgColor:null;
                let card=document.createElement('div'); card.className='shop-item-card';
                card.innerHTML=`<div>${drawPlateSVG({rawLetters:item.rawLetters,region:item.region},bg)}</div><div class="shop-item-rarity" style="color:${item.rarityColor}">${item.rarityName}</div><div class="shop-item-price">${item.worth.toLocaleString()} ₽</div><button class="shop-buy-btn" data-idx="${idx}" data-type="${type}">Купить</button>`;
                container.appendChild(card);
            });
            document.querySelectorAll('.shop-buy-btn').forEach(btn=>btn.addEventListener('click',(e)=>{ let idx=parseInt(btn.dataset.idx), t=parseInt(btn.dataset.type); buyShopItem(t,idx); }));
        }
        function buyShopItem(type,idx){
            if(animationRunning) return;
            let items=type===1?shopItemsType1:shopItemsType2;
            let item=items[idx];
            if(balance<item.worth){ showToast(`Недостаточно средств! Нужно ${item.worth.toLocaleString()} ₽`, true); return; }
            if(itemsStorage.some(s=>s.rawLetters===item.rawLetters && s.region===item.region)){ showToast(`У вас уже есть ${item.rawLetters}`, true); return; }
            if(itemsStorage.length>=100){ showToast('Место в архиве закончилось!', true); return; }
            balance-=item.worth;
            let newItem={rawLetters:item.rawLetters, region:item.region, worth:item.worth, rarity:item.type, rarityName:item.rarityName, color:item.rarityColor, bgColor:item.bgColor||null};
            itemsStorage.push(newItem);
            syncInterface(); saveGame();
            showToast(`✅ Куплен номер ${item.rawLetters} за ${item.worth.toLocaleString()} ₽`);
        }
        document.querySelectorAll('.shop-type-btn').forEach(btn=>btn.addEventListener('click',()=>{ let t=parseInt(btn.dataset.type); currentShopType=t; document.querySelectorAll('.shop-type-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderShopItems(t); }));

        // ---------- УЛУЧШЕНИЕ ----------
        function toggleUpgradeScreen(show){ if(show){ document.getElementById('upgrade-panel-screen').style.display='block'; resetCraftState(); renderMyUpgradePlatesDOM(); } else document.getElementById('upgrade-panel-screen').style.display='none'; }
        function resetCraftState(){ selectedMyCraftIdx=null; selectedTargetCraftIdx=null; document.getElementById('circle-target-preview').innerHTML='ЦЕЛЬ НЕ ВЫБРАНА'; document.getElementById('upgrade-chance-label').innerText='0%'; document.getElementById('risk-action-btn').disabled=true; recalculateCircleSectors(0); }
        function generateUpgradeTargetsGridDOM(){
            let grid=document.getElementById('up-targets-pool-grid'); grid.innerHTML='';
            let elite=document.createElement('div'); elite.className='target-section-title-embedded'; elite.innerText='Эксклюзивный рынок'; grid.appendChild(elite);
            upgradeTargetsDatabase.slice(0,12).forEach((item,idx)=>{ grid.appendChild(buildTargetGridElement(item,idx)); });
            let rare=document.createElement('div'); rare.className='target-section-title-embedded less-blat'; rare.innerText='Элитные комбинации'; grid.appendChild(rare);
            upgradeTargetsDatabase.slice(12,30).forEach((item,idx)=>{ grid.appendChild(buildTargetGridElement(item,idx+12)); });
        }
        function buildTargetGridElement(item, globalIdx) {
    let div = document.createElement('div');
    div.className = 'up-target-card';
    div.id = `target-card-${globalIdx}`;
    div.onclick = () => selectTargetCraftItem(globalIdx);
    // определяем цвет для полоски (по редкости)
    let rarityColor = 'var(--rarity-rare)';
    if (item.type === 'exclusive') rarityColor = 'var(--rarity-exclusive)';
    else if (item.type === 'elite') rarityColor = 'var(--rarity-elite)';
    else if (item.type === 'rare') rarityColor = 'var(--rarity-rare)';
    div.innerHTML = `
        <div style="width:100%; position:relative;">
            ${drawPlateSVG({rawLetters: item.rawLetters, region: item.region})}
            <div style="position: absolute; bottom: 4px; left: 4px; right: 4px; height: 3px; background: ${rarityColor}; border-radius: 0 0 4px 4px;"></div>
        </div>
        <div class="target-price-tag">${item.worth.toLocaleString()} ₽</div>
    `;
    return div;
}

        // ---------- АУКЦИОН (реальный онлайн) ----------
        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) return;
            ws = new WebSocket(`${BACKEND_URL.replace('http', 'ws')}`);
            ws.onopen = () => { if (playerId) ws.send(JSON.stringify({ type: 'auth', playerId })); };
            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                switch (msg.type) {
                    case 'init_lots': auctionLots = msg.lots; if (document.getElementById('auction-screen').style.display === 'block') renderAuctionTab(currentAuctionTab); break;
                    case 'lot_updated': { let idx = auctionLots.findIndex(l => l.lot_id === msg.lot.lot_id); if (idx !== -1) auctionLots[idx] = msg.lot; else auctionLots.push(msg.lot); if (document.getElementById('auction-screen').style.display === 'block') renderAuctionTab(currentAuctionTab); } break;
                    case 'new_lot': auctionLots.push(msg.lot); if (document.getElementById('auction-screen').style.display === 'block') renderAuctionTab(currentAuctionTab); break;
                    case 'error': showToast(msg.message, true); break;
                }
            };
            ws.onclose = () => setTimeout(connectWebSocket, 5000);
        }
        async function loadAuctionLots() {
            try { const res = await fetch(`${BACKEND_URL}/api/auction-lots`); auctionLots = await res.json(); if (document.getElementById('auction-screen').style.display === 'block') renderAuctionTab(currentAuctionTab); } catch(e) { console.error(e); }
        }
        function toggleAuctionScreen(show) {
            if (show) {
                document.getElementById('auction-screen').style.display = 'block';
                if (!ws || ws.readyState !== WebSocket.OPEN) connectWebSocket();
                loadAuctionLots().then(() => renderAuctionTab(currentAuctionTab));
            } else document.getElementById('auction-screen').style.display = 'none';
        }

        // ---------- АУКЦИОН (с сортировкой и пагинацией 5x6) ----------
let currentPage = 1;
let itemsPerPage = 30; // 5 колонок * 6 рядов
let currentSort = 'cheap'; // cheap, expensive, time

function renderAuctionTab(tab) {
    const container = document.getElementById('auction-content');
    let items = [];
    
    if (tab === 'all') {
        items = auctionLots.filter(l => !l.is_finished && l.end_time > Date.now());
    } else if (tab === 'my') {
        items = auctionLots.filter(l => l.owner_id === playerId && !l.is_finished);
    } else if (tab === 'bets') {
        items = auctionLots.filter(l => l.current_bidder_id === playerId && !l.is_finished);
    } else if (tab === 'create') {
        container.innerHTML = `
            <div class="create-lot-panel">
                <h3>Выберите номер из инвентаря</h3>
                <div class="my-items-for-sale" id="sell-select-list"></div>
                <div>Установите начальную цену (мин 1000 ₽)</div>
                <input type="number" id="sell-price" class="price-input" value="10000">
                <button id="confirm-create-lot" class="shop-buy-btn">Выложить на аукцион</button>
                <p class="small-text">Лот активен 30 минут.</p>
            </div>
        `;
        const listDiv = document.getElementById('sell-select-list');
        listDiv.innerHTML = itemsStorage.map((item, idx) => `
            <div class="selectable-item" data-sell-idx="${idx}" style="border-bottom:3px solid ${item.color}">
                ${drawPlateSVG(item)}
                <div>${item.rarityName}<br>${item.worth.toLocaleString()}₽</div>
            </div>
        `).join('');
        document.querySelectorAll('.selectable-item').forEach(el => el.onclick = () => {
            document.querySelectorAll('.selectable-item').forEach(c=>c.classList.remove('selected'));
            el.classList.add('selected');
        });
        document.getElementById('confirm-create-lot').onclick = () => {
            const selected = document.querySelector('.selectable-item.selected');
            if (!selected) { showToast('Выберите номер', true); return; }
            const idx = parseInt(selected.dataset.sellIdx);
            const plate = itemsStorage[idx];
            let price = parseInt(document.getElementById('sell-price').value);
            if (isNaN(price) || price < 1000) { showToast('Цена должна быть не менее 1000 ₽', true); return; }
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'create_lot', playerId, plate, startPrice: price }));
                itemsStorage.splice(idx, 1);
                syncInterface(); saveGame();
                showToast('Номер выставлен на аукцион!');
                renderAuctionTab('my');
            } else showToast('Нет соединения с сервером', true);
        };
        attachAuctionEvents();
        return;
    }
    
    // Сортировка
    let sorted = [...items];
    if (currentSort === 'cheap') sorted.sort((a,b) => a.current_price - b.current_price);
    if (currentSort === 'expensive') sorted.sort((a,b) => b.current_price - a.current_price);
    if (currentSort === 'time') sorted.sort((a,b) => a.end_time - b.end_time);
    
    // Пагинация
    const totalPages = Math.ceil(sorted.length / itemsPerPage);
    if (currentPage > totalPages) currentPage = totalPages || 1;
    const start = (currentPage - 1) * itemsPerPage;
    const pageItems = sorted.slice(start, start + itemsPerPage);
    
    // Рисуем сетку 5x6
    let gridHtml = '<div class="auction-lots-grid" style="grid-template-columns: repeat(5, 1fr);">';
    pageItems.forEach(lot => {
        if (tab === 'all') gridHtml += lotToHtml(lot);
        else if (tab === 'my') gridHtml += myLotToHtml(lot);
        else if (tab === 'bets') gridHtml += betLotToHtml(lot);
    });
    gridHtml += '</div>';
    
    // Кнопки сортировки и пагинации
    const controls = `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px;">
            <div style="display: flex; gap: 10px;">
                <button id="sort-cheap" class="shop-type-btn" style="background:${currentSort==='cheap'?'var(--br-red)':'#131924'}">💰 Сначала дешёвые</button>
                <button id="sort-expensive" class="shop-type-btn" style="background:${currentSort==='expensive'?'var(--br-red)':'#131924'}">💎 Сначала дорогие</button>
                <button id="sort-time" class="shop-type-btn" style="background:${currentSort==='time'?'var(--br-red)':'#131924'}">⏱ По времени</button>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button id="prev-page" class="shop-type-btn" ${currentPage===1 ? 'disabled' : ''}>◀</button>
                <span style="color: #a2b4cc;">Страница ${currentPage} / ${totalPages}</span>
                <button id="next-page" class="shop-type-btn" ${currentPage===totalPages ? 'disabled' : ''}>▶</button>
            </div>
        </div>
    `;
    
    container.innerHTML = controls + gridHtml;
    
    // Навешиваем события
    document.getElementById('sort-cheap')?.addEventListener('click', () => {
        currentSort = 'cheap';
        currentPage = 1;
        renderAuctionTab(tab);
    });
    document.getElementById('sort-expensive')?.addEventListener('click', () => {
        currentSort = 'expensive';
        currentPage = 1;
        renderAuctionTab(tab);
    });
    document.getElementById('sort-time')?.addEventListener('click', () => {
        currentSort = 'time';
        currentPage = 1;
        renderAuctionTab(tab);
    });
    document.getElementById('prev-page')?.addEventListener('click', () => {
        if (currentPage > 1) { currentPage--; renderAuctionTab(tab); }
    });
    document.getElementById('next-page')?.addEventListener('click', () => {
        if (currentPage < totalPages) { currentPage++; renderAuctionTab(tab); }
    });
    
    attachAuctionEvents();
}
        function lotToHtml(lot) { let tl = Math.max(0, lot.end_time - Date.now()); let m = Math.floor(tl/60000), s = Math.floor((tl%60000)/1000); return `<div class="lot-card" data-lot-id="${lot.lot_id}" style="border-bottom:4px solid ${lot.plate.color}"><div>${drawPlateSVG(lot.plate)}</div><div class="lot-price">💰 ${lot.current_price.toLocaleString()} ₽</div><div class="lot-time">⏱ ${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}</div><div class="lot-rarity" style="color:${lot.plate.color}">${lot.plate.rarityName}</div><button class="lot-bid-btn">Сделать ставку</button></div>`; }
        function myLotToHtml(lot) { let tl = Math.max(0, lot.end_time - Date.now()); let m = Math.floor(tl/60000), s = Math.floor((tl%60000)/1000); let hasBids = lot.current_bidder_id !== null; return `<div class="lot-card" data-lot-id="${lot.lot_id}" style="border-bottom:4px solid ${lot.plate.color}"><div>${drawPlateSVG(lot.plate)}</div><div class="lot-price">💰 ${lot.current_price.toLocaleString()} ₽</div><div class="lot-time">⏱ ${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}</div><div class="lot-rarity" style="color:${lot.plate.color}">${lot.plate.rarityName}</div><button class="lot-claim-btn" ${hasBids ? 'disabled' : ''}>Забрать обратно</button></div>`; }
        function betLotToHtml(lot) { let tl = Math.max(0, lot.end_time - Date.now()); let m = Math.floor(tl/60000), s = Math.floor((tl%60000)/1000); return `<div class="lot-card" data-lot-id="${lot.lot_id}" style="border-bottom:4px solid ${lot.plate.color}"><div>${drawPlateSVG(lot.plate)}</div><div class="lot-price">💰 ${lot.current_price.toLocaleString()} ₽</div><div class="lot-time">⏱ ${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}</div><div class="lot-rarity" style="color:${lot.plate.color}">${lot.plate.rarityName}</div><button class="lot-bid-btn">Перебить ставку</button></div>`; }
        function attachAuctionEvents() {
            document.querySelectorAll('.lot-card .lot-bid-btn').forEach(btn => {
                btn.onclick = (e) => {
                    const lotId = parseInt(btn.closest('.lot-card').dataset.lotId);
                    const lot = auctionLots.find(l => l.lot_id === lotId);
                    if (!lot || lot.is_finished || lot.end_time <= Date.now()) { showToast('Лот завершён', true); return; }
                    const minBid = lot.current_price + 1;
                    document.getElementById('bid-modal-info').innerHTML = drawPlateSVG(lot.plate) + `<div>Текущая цена: ${lot.current_price.toLocaleString()} ₽</div>`;
                    document.getElementById('bid-min-hint').innerHTML = `Минимальная ставка: ${minBid.toLocaleString()} ₽`;
                    const input = document.getElementById('bid-amount'); input.value = minBid; input.min = minBid;
                    document.getElementById('bid-confirm-btn').onclick = () => {
                        const amount = parseInt(input.value);
                        if (isNaN(amount) || amount < minBid) { showToast(`Ставка не может быть меньше ${minBid.toLocaleString()} ₽`, true); return; }
                        if (balance < amount) { showToast('Недостаточно денег', true); return; }
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({ type: 'place_bid', lotId, bidAmount: amount, playerId }));
                            balance -= amount;
                            syncInterface(); saveGame();
                            document.getElementById('bid-modal').style.display = 'none';
                        } else showToast('Нет соединения с сервером', true);
                    };
                    document.getElementById('bid-modal').style.display = 'flex';
                };
            });
            document.querySelectorAll('.lot-card .lot-claim-btn').forEach(btn => {
                btn.onclick = async (e) => {
                    const lotId = parseInt(btn.closest('.lot-card').dataset.lotId);
                    const lot = auctionLots.find(l => l.lot_id === lotId);
                    if (lot && lot.owner_id === playerId && lot.current_bidder_id === null && !lot.is_finished) {
                        try {
                            const res = await fetch(`${BACKEND_URL}/api/delete-lot`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ lotId, playerId }) });
                            if (res.ok) { itemsStorage.push(lot.plate); syncInterface(); saveGame(); loadAuctionLots(); showToast('Номер возвращён в инвентарь'); }
                            else showToast('Ошибка при возврате', true);
                        } catch(err) { showToast('Ошибка сети', true); }
                    } else showToast('Нельзя забрать этот лот', true);
                };
            });
        }

        // ---------- ИНИЦИАЛИЗАЦИЯ ----------
        window.onload = async function() {
            loadGame();
            initShopItems();
            buildRouletteRows();
            syncInterface();
            generateUpgradeTargetsGridDOM();
            YaGames.init().then(ysdk => {
                window.ysdk = ysdk;
                ysdk.getPlayer().then(player => { playerId = player.uniqueId; connectWebSocket(); loadAuctionLots(); });
                ysdk.getLang().then(lang => console.log('Язык:', lang));
                setInterval(() => {
                    if (!animationRunning && document.getElementById('auction-screen').style.display !== 'block' && document.getElementById('shop-screen').style.display !== 'block' && document.getElementById('upgrade-panel-screen').style.display !== 'block') {
                        const now = Date.now();
                        if (now - lastAdTime >= adCooldown) { lastAdTime = now; ysdk.adv.showFullscreenAdv().catch(e=>console.warn); }
                    }
                }, 5000);
            }).catch(e => { console.warn('SDK не загружен, тестовый ID'); playerId = 'test_' + Math.random(); connectWebSocket(); loadAuctionLots(); });
            window.closePopup = closePopup;
            document.getElementById('sell-action-btn').onclick = sellItem;
            document.getElementById('sell-all-btn').onclick = sellAllPlates;
            document.getElementById('spin-action-btn').onclick = triggerRoulette;
            document.getElementById('open-shop-btn').onclick = () => toggleShopScreen(true);
            document.getElementById('open-upgrade-btn').onclick = () => toggleUpgradeScreen(true);
            document.getElementById('open-auction-btn').onclick = () => toggleAuctionScreen(true);
            document.getElementById('calendarIcon').onclick = openCalendar;
            document.getElementById('claimDailyBtn').onclick = () => { let avail=[]; for(let i=1;i<=7;i++) if(lastClaimDay>=i && !claimedDays.includes(i)) avail.push(i); if(avail.length) claimReward(avail[0]); else showToast('Нет доступных подарков', true); };
            document.getElementById('bid-cancel-btn').onclick = () => document.getElementById('bid-modal').style.display = 'none';
            document.querySelectorAll('.auction-tab').forEach(tab => { tab.onclick = () => { document.querySelectorAll('.auction-tab').forEach(t=>t.classList.remove('active')); tab.classList.add('active'); currentAuctionTab = tab.dataset.tab; renderAuctionTab(currentAuctionTab); }; });
            document.querySelectorAll('.shop-type-btn').forEach(btn => { btn.addEventListener('click', () => { let t = parseInt(btn.dataset.type); currentShopType = t; document.querySelectorAll('.shop-type-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderShopItems(t); }); });
        };
    </script>
